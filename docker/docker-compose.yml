# ============================================================
# debuga.ai — Docker Compose (Produção VM Própria)
#
# Serviços: app, postgres, minio, ollama (GPU), nginx, certbot
# Volumes persistentes: /data/debuga/*
# GPU: nvidia runtime para Ollama (requer nvidia-container-toolkit)
#
# Uso:
#   docker compose up -d                       # Core (app, postgres, minio, nginx)
#   docker compose --profile gpu up -d         # Core + Ollama GPU
#   docker compose --profile gpu up -d ollama  # Apenas Ollama
#   docker compose logs -f app                 # Logs da aplicação
#
# Pré-requisitos:
#   - .env preenchido (sem CHANGE_ME em variáveis obrigatórias)
#   - /data/debuga/ criado (scripts/install.sh faz isso)
#   - Certificado TLS em /etc/letsencrypt/live/${DOMAIN}/
# ============================================================

services:
  # ── Application ──
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VITE_APP_ID: ${VITE_APP_ID:-debuga-ai}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-debuga.ai}
        VITE_APP_LOGO: ${VITE_APP_LOGO:-}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
        VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}
        VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
        VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT:-}
        VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID:-}
        VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-}
    container_name: debuga-app
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/${POSTGRES_DB:-debuga_prod}?sslmode=disable
      - S3_ENDPOINT=http://minio:9000
      - LOCAL_LLM_BASE_URL=http://ollama:11434
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - debuga-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: debuga-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-debuga_prod}
    volumes:
      - /data/debuga/postgres:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-debuga} -d ${POSTGRES_DB:-debuga_prod}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - debuga-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── MinIO (S3-compatible storage) ──
  minio:
    image: minio/minio:latest
    container_name: debuga-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - /data/debuga/minio:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - debuga-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Ollama (Local GPU LLM inference) ──
  # Ativado com: docker compose --profile gpu up -d
  # Requer: nvidia-container-toolkit instalado no host
  ollama:
    image: ollama/ollama:latest
    container_name: debuga-ollama
    restart: unless-stopped
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - /data/debuga/ollama:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-1}
      OLLAMA_GPU_OVERHEAD: ${OLLAMA_GPU_OVERHEAD:-0}
      # Manter modelo carregado indefinidamente (elimina cold starts)
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:--1}
    healthcheck:
      # GET /api/tags é leve e confirma que Ollama está respondendo
      # start_period alto para tolerar cold start de GPU (modelo carregando)
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5
    networks:
      - debuga-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx (Reverse proxy + TLS) ──
  # Usa /etc/nginx/templates/ para processar envsubst automaticamente
  # O nginx:alpine gera /etc/nginx/conf.d/app.conf a partir do template
  nginx:
    image: nginx:alpine
    container_name: debuga-nginx
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:-debuga.ai}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /data/debuga/nginx-logs:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - debuga-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Certbot (renovação automática de TLS) ──
  certbot:
    image: certbot/certbot:latest
    container_name: debuga-certbot
    restart: "no"
    profiles:
      - certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: /bin/sh
    command: -c "certbot renew --webroot -w /var/www/certbot --quiet && echo 'Renewal complete'"

networks:
  debuga-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
